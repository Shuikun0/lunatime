<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lunatime — 地球日照</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #eef3f6;
      --muted: #8fa3b3;
      --accent: #d4a85a;
      --accent-soft: rgba(212, 168, 90, 0.16);
      --sun: #f2c14b;
      --panel: rgba(8, 14, 22, 0.62);
      --line: rgba(238, 243, 246, 0.1);
      --glow: rgba(120, 170, 210, 0.14);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: "Outfit", "PingFang SC", sans-serif;
      color: var(--ink); background: #050910;
    }
    #globe {
      position: fixed; inset: 0; display: block;
      width: 100%; height: 100%; touch-action: none; cursor: grab;
    }
    #globe.dragging { cursor: grabbing; }
    .ui { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
    .ui > * { pointer-events: auto; }

    .top {
      position: absolute; top: 1.25rem; left: 1.35rem;
      max-width: min(28rem, calc(100vw - 2.5rem));
      z-index: 3;
    }
    .brand {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(2rem, 4.5vw, 2.75rem);
      font-weight: 400; line-height: 0.95;
      letter-spacing: -0.03em;
      text-shadow: 0 10px 40px rgba(0,0,0,0.55);
    }
    .brand em {
      font-style: italic; font-weight: 500;
      color: var(--accent);
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      border: 1px solid var(--line);
      border-radius: 1.15rem;
      box-shadow:
        0 24px 60px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .side {
      position: absolute; top: 1.25rem; right: 1.15rem; bottom: 0;
      width: min(320px, calc(100vw - 2rem));
      overflow: auto;
      padding: 1.1rem 1.15rem 1.15rem;
      border-radius: 1.15rem 1.15rem 0 0;
      border-bottom: none;
      z-index: 3;
    }
    .side::-webkit-scrollbar { width: 4px; }
    .side::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    .eyebrow {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 0.35rem;
    }
    .place {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.55rem; line-height: 1.15; font-weight: 400;
      margin-bottom: 0.75rem;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem 0.85rem;
      padding: 0.85rem 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .stat { background: none; border: none; padding: 0; border-radius: 0; }
    .stat.wide { grid-column: 1 / -1; }
    .stat .k {
      font-size: 0.66rem; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); font-weight: 600;
    }
    .stat .v {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.35rem; margin-top: 0.12rem; line-height: 1.1;
      color: var(--ink);
    }
    .stat.wide .v { font-size: 1.7rem; color: var(--accent); }
    .stat.daylen-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .daylen-main { min-width: 0; }
    .tz-inline {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
      padding-bottom: 0.2rem;
    }
    .tz-inline label {
      font-size: 0.66rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }
    .tz-inline input {
      width: 2.75rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      border-radius: 0.4rem;
      color: var(--ink);
      font: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 0.22rem 0.3rem;
      text-align: center;
    }

    .chart-title {
      margin-top: 1rem; margin-bottom: 0.15rem;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
    }
    canvas#dayChart, canvas#sunChart, canvas#uvChart {
      width: 100%; display: block; margin-top: 0.35rem;
      border-radius: 0.5rem; background: rgba(255,255,255,0.025);
    }
    canvas#dayChart { height: 92px; }
    canvas#sunChart { height: 120px; }
    canvas#uvChart { height: 130px; }

    .uv-note {
      margin-top: 0.55rem;
      padding: 0.65rem 0.7rem;
      border-radius: 0.65rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      font-size: 0.78rem;
      line-height: 1.5;
      color: var(--muted);
    }
    .uv-note strong {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: 0.95rem;
      color: var(--ink);
    }
    .uv-note .uv-line { color: var(--ink); opacity: 0.88; }

    .chart-label { margin-top: 0.25rem; font-size: 0.7rem; color: var(--muted); opacity: 0.85; }
    .chart-tip {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      display: none;
      padding: 0.4rem 0.55rem;
      border-radius: 0.45rem;
      background: rgba(8, 14, 22, 0.92);
      border: 1px solid rgba(238, 243, 246, 0.14);
      color: var(--ink);
      font-size: 0.72rem;
      line-height: 1.35;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      transform: translate(10px, 12px);
    }
    .chart-tip.on { display: block; }

    .geo-menu {
      position: fixed;
      z-index: 30;
      display: none;
      max-width: min(22rem, calc(100vw - 1.5rem));
      padding: 0.4rem;
      border-radius: 1.1rem;
      background: var(--panel);
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      border: 1px solid var(--line);
      box-shadow:
        0 24px 60px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: visible;
    }
    .geo-menu.on {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.3rem;
    }
    .geo-menu .geo-head {
      flex: 1 0 100%;
      padding: 0.2rem 0.45rem 0.35rem;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .geo-menu button {
      display: inline-flex;
      align-items: baseline;
      gap: 0.4rem;
      width: auto;
      max-width: 100%;
      text-align: left;
      border: 1px solid rgba(238, 243, 246, 0.1);
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: var(--ink);
      font-size: 0.76rem;
      font-weight: 500;
      padding: 0.32rem 0.65rem;
      white-space: nowrap;
      line-height: 1.25;
    }
    .geo-menu button:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(238, 243, 246, 0.22);
    }
    .geo-menu button .d {
      flex-shrink: 0;
      font-size: 0.64rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .geo-menu .geo-empty {
      padding: 0.4rem 0.55rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .cities {
      display: flex; flex-wrap: wrap; gap: 0.35rem;
      margin-top: 0.55rem;
    }
    .city-search-wrap {
      margin-top: 1rem; padding-top: 0.85rem;
      border-top: 1px solid var(--line);
    }
    .city-search {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      border-radius: 0.55rem;
      color: var(--ink);
      font: inherit;
      font-size: 0.82rem;
      padding: 0.45rem 0.65rem;
      outline: none;
    }
    .city-search::placeholder { color: var(--muted); opacity: 0.85; }
    .city-search:focus {
      border-color: rgba(212, 168, 90, 0.45);
    }
    .city-empty {
      width: 100%;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 0.25rem 0.1rem;
    }
    .city-hint {
      margin-top: 0.45rem;
      font-size: 0.7rem;
      line-height: 1.4;
      color: var(--muted);
      opacity: 0.9;
    }
    .lat-row {
      display: grid;
      grid-template-columns: 2.4rem minmax(0, 1fr) 3.4rem;
      align-items: center;
      gap: 0.55rem;
      margin-top: 0.7rem;
    }
    .lat-row label {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
    }
    .chips {
      display: flex; flex-wrap: wrap; gap: 0.35rem;
    }
    .chips button,
    .cities button {
      font-size: 0.74rem; font-weight: 500;
      padding: 0.32rem 0.65rem;
      border-radius: 999px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .chips button:hover,
    .cities button:hover {
      color: var(--ink);
      border-color: rgba(212,168,90,0.35);
      background: var(--accent-soft);
    }
    .cities button.locate {
      border-color: var(--line);
      color: var(--muted);
      font-weight: 500;
      border-radius: 0.55rem;
    }
    .cities button.locate:hover {
      color: var(--ink);
      border-color: rgba(212,168,90,0.35);
      background: var(--accent-soft);
    }
    .cities button.locate:disabled {
      opacity: 0.55;
      cursor: wait;
    }
    .compare-block {
      margin-top: 1rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--line);
    }
    .compare-block .chart-title { margin-top: 0; }
    .compare-block .chips { margin-top: 0.45rem; }
    .compare-tools {
      display: flex; flex-direction: column; gap: 0.45rem;
      margin-top: 0.65rem;
    }
    .compare-actions {
      display: flex; align-items: stretch; gap: 0.4rem;
      width: 100%;
    }
    .compare-actions .cmp-btn {
      flex: 1;
      min-width: 0;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.45rem 0.65rem;
      border-radius: 0.55rem;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--ink);
      text-align: center;
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .compare-actions .cmp-btn:hover {
      border-color: rgba(212, 168, 90, 0.45);
      background: rgba(255,255,255,0.08);
    }
    .compare-actions .cmp-btn[hidden] { display: none; }
    .cmp-align {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.35rem 0.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .cmp-align[hidden] { display: none !important; }
    .cmp-align input {
      width: 0.9rem; height: 0.9rem;
      accent-color: #8ec4e0;
      cursor: pointer;
    }
    .compare-tools .cmp-label {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.35;
    }
    .compare-tools .cmp-label em {
      font-style: normal;
      color: #8ec4e0;
    }
    .chart-legend {
      display: flex; flex-wrap: wrap; gap: 0.55rem 0.85rem;
      margin-top: 0.3rem; font-size: 0.68rem; color: var(--muted);
    }
    .chart-legend[hidden] { display: none; }
    .chart-legend i {
      display: inline-block; width: 0.7rem; height: 2px;
      vertical-align: middle; margin-right: 0.3rem;
      border-radius: 1px;
    }

    .bottom {
      position: absolute;
      left: 0;
      right: calc(min(320px, 100vw - 2rem) + 1.5rem);
      bottom: 0;
      width: auto;
      max-width: none;
      transform: none;
      padding: 0.55rem 1.1rem 0.65rem;
      border-radius: 1rem 1rem 0 0;
      border-bottom: none;
      z-index: 2;
    }
    .controls { display: grid; gap: 0.45rem; }
    .row {
      display: grid;
      grid-template-columns: 2.4rem minmax(0, 1fr) 5.6rem auto;
      align-items: center;
      gap: 0.55rem;
    }
    .row label {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
    }
    input[type="range"] {
      width: 100%;
      min-width: 0;
      accent-color: var(--accent);
      height: 0.3rem;
    }
    .value {
      min-width: 0;
      text-align: right; font-weight: 600;
      font-variant-numeric: tabular-nums; font-size: 0.88rem;
      white-space: nowrap;
    }
    .row .play {
      justify-self: start;
      font-size: 0.75rem;
      padding: 0.32rem 0.7rem;
      white-space: nowrap;
    }
    .bottom-inner {
      display: flex;
      align-items: stretch;
      gap: 0.55rem;
    }
    .bottom-inner .controls {
      flex: 1;
      min-width: 0;
    }
    .now-col {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 0.45rem;
      flex-shrink: 0;
    }
    button.now-bottom {
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0 0.65rem;
      border-radius: 999px;
      border-color: var(--line);
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      min-width: 2.8rem;
    }
    button.now-bottom:hover {
      color: var(--ink);
      border-color: rgba(238, 243, 246, 0.18);
      background: rgba(255,255,255,0.08);
    }
    button {
      appearance: none; border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--ink); font: inherit; font-size: 0.8rem; font-weight: 500;
      padding: 0.4rem 0.8rem; border-radius: 999px; cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    button:hover { border-color: rgba(212,168,90,0.45); background: var(--accent-soft); }
    button.primary {
      background: var(--accent); border-color: transparent; color: #1a1408; font-weight: 600;
    }
    button.primary:hover { filter: brightness(1.06); }
    button[aria-pressed="true"] {
      background: #f2c14b; border-color: transparent; color: #1a1408;
    }
    button.play[aria-pressed="true"] {
      background: rgba(255,255,255,0.1);
      border-color: rgba(238, 243, 246, 0.22);
      color: var(--ink);
    }

    .loading {
      position: fixed; inset: 0; z-index: 5; display: grid; place-items: center;
      background: #050910; color: var(--muted); font-size: 0.95rem; text-align: center; padding: 1.5rem;
    }
    .loading.hide { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }

    @media (max-width: 720px) {
      .side {
        top: auto; bottom: 5.2rem; right: 0.7rem; left: 0.7rem;
        width: auto; max-height: 36vh;
      }
      .top { left: 0.9rem; right: 0.9rem; }
      .bottom {
        right: 0;
        padding: 0.5rem 0.75rem 0.55rem;
      }
      .row {
        grid-template-columns: 2.2rem minmax(0, 1fr) 4.8rem auto;
        gap: 0.4rem;
      }
      .row .play { padding: 0.28rem 0.55rem; font-size: 0.7rem; }
      .value { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">正在启动…</div>
  <div class="chart-tip" id="chartTip"></div>
  <div class="geo-menu" id="geoMenu" role="menu"></div>
  <canvas id="globe"></canvas>

  <div class="ui">
    <div class="top">
      <div class="brand">Luna<em>time</em></div>
    </div>

    <aside class="panel side">
      <div class="eyebrow">当前位置</div>
      <div class="place" id="placeName">北纬 39.9° · 东经 116.4°</div>

      <div class="stats">
        <div class="stat wide daylen-row">
          <div class="daylen-main">
            <div class="k">今日日照</div>
            <div class="v" id="dayLen">—</div>
          </div>
          <div class="tz-inline">
            <label for="tz">UTC</label>
            <input id="tz" type="number" min="-12" max="14" step="1" value="8" />
          </div>
        </div>
        <div class="stat"><div class="k">日出</div><div class="v" id="sunrise" style="font-size:1.15rem">—</div></div>
        <div class="stat"><div class="k">日落</div><div class="v" id="sunset" style="font-size:1.15rem">—</div></div>
        <div class="stat"><div class="k">正午高度</div><div class="v" id="noonAlt">—</div></div>
        <div class="stat"><div class="k">此刻 UV</div><div class="v" id="nowUvi">—</div></div>
      </div>

      <div class="chart-title">当日太阳高度角</div>
      <canvas id="sunChart" width="600" height="260"></canvas>
      <div class="chart-label" id="sunChartLabel">按所选时区钟点</div>

      <div class="chart-title">当日紫外线强度（晴空预估）</div>
      <canvas id="uvChart" width="600" height="280"></canvas>
      <div class="uv-note" id="uvNote">—</div>

      <div class="chart-title">全年日照时长</div>
      <canvas id="dayChart" width="600" height="200"></canvas>

      <div class="city-search-wrap">
        <input class="city-search" id="citySearch" type="search" placeholder="搜索城市（中文 / English）…" autocomplete="off" />
        <div class="cities" id="cities"></div>
        <div class="city-hint">提示：在地球上右键，可查看点击处 500 km 内的城市</div>
        <div class="lat-row">
          <label for="lat">纬度</label>
          <input id="lat" type="range" min="-89" max="89" value="39.9" step="0.1" />
          <div class="value" id="latLabel">39.9°N</div>
        </div>
      </div>

      <div class="compare-block">
        <div class="chart-title">节气</div>
        <div class="chips">
          <button data-day="79" class="ms" type="button">春分</button>
          <button data-day="171" class="ms" type="button">夏至</button>
          <button data-day="265" class="ms" type="button">秋分</button>
          <button data-day="355" class="ms" type="button">冬至</button>
        </div>
        <div class="chart-title" style="margin-top:0.85rem">位置对比</div>
        <div class="compare-tools">
          <div class="compare-actions">
            <button type="button" id="cmpAdd" class="cmp-btn">加入对比</button>
            <button type="button" id="cmpClear" class="cmp-btn" hidden>清除对比</button>
          </div>
          <label class="cmp-align" id="cmpAlign" hidden>
            <input type="checkbox" id="lonAlign" checked />
            经度对齐
          </label>
          <span class="cmp-label" id="cmpLabel"></span>
        </div>
        <div class="chart-legend" id="cmpLegend" hidden>
          <span><i style="background:#f0b429"></i>当前</span>
          <span><i style="background:#8ec4e0"></i>对比</span>
        </div>
      </div>
    </aside>

    <div class="bottom panel">
      <div class="bottom-inner">
        <div class="now-col">
          <button type="button" id="jumpToday" class="now-bottom">此日</button>
          <button type="button" id="jumpNow" class="now-bottom">此刻</button>
        </div>
        <div class="controls">
          <div class="row">
            <label for="day">日期</label>
            <input id="day" type="range" min="0" max="364" value="171" />
            <div class="value" id="dayLabel">6月21日</div>
            <button class="play" id="playYear" type="button" aria-pressed="false">播放</button>
          </div>
          <div class="row">
            <label for="hour">时刻</label>
            <input id="hour" type="range" min="0" max="24" value="12" step="0.05" />
            <div class="value" id="hourLabel">12:00</div>
            <button class="play" id="playDay" type="button" aria-pressed="false">播放</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var loading = document.getElementById("loading");
      function hideLoading(msg) {
        if (!loading) return;
        if (msg) loading.textContent = msg;
        loading.classList.add("hide");
      }

      try {
        boot();
      } catch (err) {
        console.error(err);
        if (loading) {
          loading.innerHTML = "启动失败：<br>" + String(err && err.message ? err.message : err);
        }
      }

      function boot() {
        var OBLIQUITY = 23.44;
        var MONTH_DAYS = [31,28,31,30,31,30,31,31,30,31,30,31];
        var MONTH_NAMES = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
        var FEATURED = [

        function makeProceduralTexture() {

            [620,150,120,70],[700,200,80,50],[780,160,60,45],
            [820,320,70,40],[300,360,50,30]

        function loadImageData(src, onOk, onFail) {

        function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
        function dayToDate(n) {
          var d = ((n % 365) + 365) % 365;
          for (var m = 0; m < 12; m++) {
            if (d < MONTH_DAYS[m]) return { month: m, day: d + 1 };
            d -= MONTH_DAYS[m];
          }
          return { month: 11, day: 31 };
        }
        function formatDay(n) {
          var t = dayToDate(n);
          return MONTH_NAMES[t.month] + t.day + "日";
        }
        function formatClock(h) {
          if (h == null) return "—";
          var hrs = Math.floor(h);
          var mins = Math.round((h - hrs) * 60) % 60;
          return String(hrs).padStart(2, "0") + ":" + String(mins).padStart(2, "0");
        }
        function formatHours(h) {
          if (h >= 23.99) return "极昼 24h";
          if (h <= 0.01) return "极夜 0h";
          var hrs = Math.floor(h);
          var mins = Math.round((h - hrs) * 60);
          return hrs + "h " + String(mins).padStart(2, "0") + "m";
        }
        function solarDeclination(n) {
          return OBLIQUITY * Math.sin((2 * Math.PI * (n - 81)) / 365);
        }
        function dayLengthHours(lat, n) {
          var phi = (lat * Math.PI) / 180;
          var delta = (solarDeclination(n) * Math.PI) / 180;
          var cosH = -Math.tan(phi) * Math.tan(delta);
          if (cosH <= -1) return 24;
          if (cosH >= 1) return 0;
          var H = Math.acos(clamp(cosH, -1, 1));
          return (2 * H * 180) / (Math.PI * 15);
        }
        function solarAltitude(lat, n, localHour) {
          var phi = (lat * Math.PI) / 180;
          var delta = (solarDeclination(n) * Math.PI) / 180;
          var H = ((localHour - 12) * 15 * Math.PI) / 180;
          var sinAlt = Math.sin(phi) * Math.sin(delta) + Math.cos(phi) * Math.cos(delta) * Math.cos(H);
          return (Math.asin(clamp(sinAlt, -1, 1)) * 180) / Math.PI;
        }
        function sunriseSunset(lat, n) {
          var len = dayLengthHours(lat, n);
          if (len >= 23.99) return { rise: null, set: null, kind: "polar-day" };
          if (len <= 0.01) return { rise: null, set: null, kind: "polar-night" };
          return { rise: 12 - len / 2, set: 12 + len / 2, kind: "normal" };
        }
        function localSolarHour(lon, utc) {
          return ((utc + lon / 15) % 24 + 24) % 24;
        }
        function subsolarPoint(n, utc) {
          return {
            lat: solarDeclination(n),
            lon: ((15 * (12 - utc) + 540) % 360) - 180
          };
        }
        function formatPlace(lat, lon) {
          var ns = lat >= 0 ? "北纬" : "南纬";
          var ew = lon >= 0 ? "东经" : "西经";
          return ns + " " + Math.abs(lat).toFixed(1) + "° · " + ew + " " + Math.abs(lon).toFixed(1) + "°";
        }
        function formatLatShort(lat) {
          return Math.abs(lat).toFixed(1) + "°" + (lat >= 0 ? "N" : "S");
        }

        // Convert lat/lon to unit vector (Y-up)
        function latLonToVec(lat, lon) {
          var phi = (90 - lat) * Math.PI / 180;
          var th = (lon + 180) * Math.PI / 180;
          return {
            x: -Math.sin(phi) * Math.cos(th),
            y: Math.cos(phi),
            z: Math.sin(phi) * Math.sin(th)
          };
        }
        function vecToLatLon(x, y, z) {
          var len = Math.sqrt(x * x + y * y + z * z) || 1;
          x /= len; y /= len; z /= len;
          var lat = 90 - Math.acos(clamp(y, -1, 1)) * 180 / Math.PI;
          var lon = Math.atan2(z, -x) * 180 / Math.PI - 180;
          lon = ((lon + 540) % 360) - 180;
          return { lat: lat, lon: lon };
        }

        // Rotate vector by camera yaw/pitch (view transform)
        function worldToView(x, y, z) {
          // yaw around Y
          var cy = Math.cos(yaw), sy = Math.sin(yaw);
          var x1 = x * cy + z * sy;
          var z1 = -x * sy + z * cy;
          // pitch around X
          var cp = Math.cos(pitch), sp = Math.sin(pitch);
          var y2 = y * cp - z1 * sp;
          var z2 = y * sp + z1 * cp;
          return { x: x1, y: y2, z: z2 };
        }
        function viewToWorld(x, y, z) {
          var cp = Math.cos(pitch), sp = Math.sin(pitch);
          var y1 = y * cp + z * sp;
          var z1 = -y * sp + z * cp;
          var cy = Math.cos(yaw), sy = Math.sin(yaw);
          var x2 = x * cy - z1 * sy;
          var z2 = x * sy + z1 * cy;
          return { x: x2, y: y1, z: z2 };
        }

        function sampleTex(lat, lon) {
          var u = ((lon + 180) / 360);
          var v = ((90 - lat) / 180);
          u = ((u % 1) + 1) % 1;
          v = clamp(v, 0, 0.9999);
          var px = Math.floor(u * texW);
          var py = Math.floor(v * texH);
          var i = (py * texW + px) * 4;
          return [texData[i], texData[i + 1], texData[i + 2]];
        }

        function sampleLights(lat, lon, out) {
          var u = ((lon + 180) / 360);
          var v = ((90 - lat) / 180);
          u = ((u % 1) + 1) % 1;
          v = clamp(v, 0, 0.9999);
          var px = Math.floor(u * texW);
          var py = Math.floor(v * texH);
          var i = (py * texW + px) * 4;
          out[0] = lightsData[i];
          out[1] = lightsData[i + 1];
          out[2] = lightsData[i + 2];
          return out;
        }

        var globeImage = null;
        var dirty = true;

        function renderGlobeBuffer() {
          var img = bctx.createImageData(BUF, BUF);
          var data = img.data;
          var sub = subsolarPoint(dayOfYear, utcHourNow());
          var sun = latLonToVec(sub.lat, sub.lon);
          var R = BUF / 2;
          var cx = R, cy = R;
          var L = lightsScratch;

          for (var py = 0; py < BUF; py++) {
            for (var px = 0; px < BUF; px++) {
              var nx = (px - cx + 0.5) / R;
              var ny = (cy - py - 0.5) / R;
              var rr = nx * nx + ny * ny;
              var idx = (py * BUF + px) * 4;
              if (rr > 1) {
                data[idx] = 5; data[idx + 1] = 10; data[idx + 2] = 16; data[idx + 3] = 255;
                continue;
              }
              var nz = Math.sqrt(1 - rr);
              // view-space point on sphere → world
              var w = viewToWorld(nx, ny, nz);
              var ll = vecToLatLon(w.x, w.y, w.z);
              var rgb = sampleTex(ll.lat, ll.lon);
              // lighting: day/night by sun · normal
              var ndot = w.x * sun.x + w.y * sun.y + w.z * sun.z;
              // Readable dusk band (smoothstep over ±TWILIGHT) + dark night floor
              // Narrower than ±0.55 washout; softer than a knife-edge cut.
              var TWILIGHT = 0.26;
              var NIGHT_FLOOR = 0.028;
              var t = clamp((ndot + TWILIGHT) / (2 * TWILIGHT), 0, 1);
              t = t * t * (3 - 2 * t);
              // Mild second smoothstep: steeper mid-terminator without a hard cut
              t = t * t * (3 - 2 * t);
              var shade = NIGHT_FLOOR + (1 - NIGHT_FLOOR) * t;
              var edge = Math.pow(nz, 0.55); // limb darkening-ish
              shade *= 0.75 + 0.25 * edge;
              var r = rgb[0] * shade;
              var g = rgb[1] * shade;
              var b = rgb[2] * shade;
              // Aerial city lights: additive on night side, fade across twilight
              if (ndot < 0.22) {
                var nightFac = ndot < 0
                  ? Math.pow(clamp(-ndot, 0, 1), 0.7)
                  : Math.pow(1 - ndot / 0.22, 2) * 0.18;
                nightFac *= 0.7 + 0.3 * edge;
                if (nightFac > 0.01) {
                  sampleLights(ll.lat, ll.lon, L);
                  // Warm aerial glow (boost + slight amber); slightly toned vs prior
                  var boost = 1.32 * nightFac;
                  r += L[0] * boost;
                  g += L[1] * boost * 0.88;
                  b += L[2] * boost * 0.62;
                }
              }
              data[idx] = r > 255 ? 255 : r;
              data[idx + 1] = g > 255 ? 255 : g;
              data[idx + 2] = b > 255 ? 255 : b;
              data[idx + 3] = 255;
            }
          }
          bctx.putImageData(img, 0, 0);
          globeImage = buf;
          dirty = false;
        }

        function resize() {
          var dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = Math.floor(window.innerWidth * dpr);
          canvas.height = Math.floor(window.innerHeight * dpr);
          dirty = true;
        }
        window.addEventListener("resize", resize);
        resize();

        function pickLatLon(clientX, clientY) {
          var rect = canvas.getBoundingClientRect();
          var x = clientX - rect.left;
          var y = clientY - rect.top;
          var size = Math.min(rect.width, rect.height) * 0.72 * zoom;
          var cx = rect.width * 0.42;
          var cy = rect.height * 0.5;
          var nx = (x - cx) / (size / 2);
          var ny = (cy - y) / (size / 2);
          var rr = nx * nx + ny * ny;
          if (rr > 1) return null;
          var nz = Math.sqrt(1 - rr);
          var w = viewToWorld(nx, ny, nz);
          return vecToLatLon(w.x, w.y, w.z);

        function projectLatLon(lat, lon) {
          var v = latLonToVec(lat, lon);
          var view = worldToView(v.x, v.y, v.z);
          if (view.z < 0) return null; // back side
          var rect = canvas.getBoundingClientRect();
          var dpr = canvas.width / rect.width;
          var size = Math.min(rect.width, rect.height) * 0.72 * zoom;
          var cx = rect.width * 0.42;
          var cy = rect.height * 0.5;
          return {
            x: (cx + view.x * size / 2) * dpr,
            y: (cy - view.y * size / 2) * dpr,
            front: true

            ctx.arc(sp.x, sp.y, 18 * dpr, 0, Math.PI * 2);
            ctx.fill();

          var p = projectLatLon(selLat, selLon);
          if (p) {
            var gg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 20 * dpr);
            gg.addColorStop(0, "rgba(255, 255, 255, 1)");
            gg.addColorStop(0.14, "rgba(210, 255, 230, 0.95)");
            gg.addColorStop(0.32, "rgba(90, 210, 150, 0.55)");
            gg.addColorStop(0.6, "rgba(60, 180, 130, 0.18)");
            gg.addColorStop(1, "rgba(60, 170, 120, 0)");

            ctx.beginPath();
            ctx.arc(p.x, p.y, 20 * dpr, 0, Math.PI * 2);

            ctx.beginPath();
            ctx.arc(p.x, p.y, 2.2 * dpr, 0, Math.PI * 2);

          }

            var cp = projectLatLon(cmpLat, cmpLon);

              cg.addColorStop(0, "rgba(255, 255, 255, 0.95)");
              cg.addColorStop(0.18, "rgba(200, 230, 245, 0.9)");
              cg.addColorStop(0.4, "rgba(142, 196, 224, 0.5)");
              cg.addColorStop(0.7, "rgba(142, 196, 224, 0.14)");
              cg.addColorStop(1, "rgba(142, 196, 224, 0)");
              ctx.fillStyle = cg;
              ctx.beginPath();
              ctx.arc(cp.x, cp.y, 16 * dpr, 0, Math.PI * 2);
              ctx.fill();
              ctx.beginPath();
              ctx.arc(cp.x, cp.y, 2 * dpr, 0, Math.PI * 2);
              ctx.fillStyle = "#8ec4e0";
              ctx.fill();
            }
          }

          // Right-click nearby-city preview
          if (geoPick) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
            ctx.clip();
            drawGeoRadiusRing(ctx, geoPick.lat, geoPick.lon, 500, dpr);
            var hi = geoPick.hover;
            for (var gi = 0; gi < geoPick.cities.length; gi++) {
              var gc = geoPick.cities[gi];
              var gp = projectLatLon(gc.lat, gc.lon);
              if (!gp) continue;
              var hot = gi === hi;
              var r = (hot ? 7 : 3.2) * dpr;
              var grd = ctx.createRadialGradient(gp.x, gp.y, 0, gp.x, gp.y, r * 2.2);
              if (hot) {
                grd.addColorStop(0, "rgba(255,255,255,1)");
                grd.addColorStop(0.35, "rgba(255,255,255,0.55)");
                grd.addColorStop(1, "rgba(255,255,255,0)");
              } else {
                grd.addColorStop(0, "rgba(255,255,255,0.9)");
                grd.addColorStop(0.45, "rgba(255,255,255,0.22)");
                grd.addColorStop(1, "rgba(255,255,255,0)");
              }
              ctx.fillStyle = grd;
              ctx.beginPath();
              ctx.arc(gp.x, gp.y, r * 2.2, 0, Math.PI * 2);
              ctx.fill();
              ctx.beginPath();
              ctx.arc(gp.x, gp.y, hot ? 2.4 * dpr : 1.35 * dpr, 0, Math.PI * 2);
              ctx.fillStyle = hot ? "#ffffff" : "rgba(255,255,255,0.75)";
              ctx.fill();
            }
            ctx.restore();
          }
        }

        function destinationPoint(lat, lon, bearingDeg, distKm) {
          var R = 6371;
          var δ = distKm / R;
          var θ = bearingDeg * Math.PI / 180;
          var φ1 = lat * Math.PI / 180;
          var λ1 = lon * Math.PI / 180;
          var sinφ2 = Math.sin(φ1) * Math.cos(δ) + Math.cos(φ1) * Math.sin(δ) * Math.cos(θ);
          var φ2 = Math.asin(clamp(sinφ2, -1, 1));
          var λ2 = λ1 + Math.atan2(
            Math.sin(θ) * Math.sin(δ) * Math.cos(φ1),
            Math.cos(δ) - Math.sin(φ1) * Math.sin(φ2)
          );
          return {
            lat: φ2 * 180 / Math.PI,
            lon: ((λ2 * 180 / Math.PI + 540) % 360) - 180
          };
        }
        function drawGeoRadiusRing(c, lat, lon, km, dpr) {
          var started = false;
          var prev = null;
          c.beginPath();
          for (var i = 0; i <= 96; i++) {
            var ll = destinationPoint(lat, lon, (360 * i) / 96, km);
            var pt = projectLatLon(ll.lat, ll.lon);
            if (!pt) {
              started = false;
              prev = null;
              continue;
            }
            if (!started) {
              c.moveTo(pt.x, pt.y);
              started = true;
            } else {
              var dx = pt.x - prev.x, dy = pt.y - prev.y;
              if (dx * dx + dy * dy > (48 * dpr) * (48 * dpr)) c.moveTo(pt.x, pt.y);
              else c.lineTo(pt.x, pt.y);
            }
            prev = pt;
          }
          c.strokeStyle = "rgba(255,255,255,0.28)";
          c.lineWidth = 1 * dpr;
          c.setLineDash([3.5 * dpr, 5 * dpr]);
          c.lineCap = "round";
          c.stroke();
          c.setLineDash([]);
        }

        /** Draw visible arc of a latitude parallel on the orthographic globe. */
        function drawLatitudeArc(c, lat, dpr, stroke, lineWidth) {
          var started = false;
          var prev = null;
          c.beginPath();
          c.strokeStyle = stroke;
          c.lineWidth = lineWidth;
          c.setLineDash([2.5 * dpr, 5.5 * dpr]);
          c.lineCap = "round";
          for (var i = 0; i <= 128; i++) {
            var lon = -180 + (360 * i) / 128;
            var pt = projectLatLon(lat, lon);
            if (!pt) {
              started = false;
              prev = null;
              continue;
            }
            if (!started) {
              c.moveTo(pt.x, pt.y);
              started = true;
            } else {
              // break if jump across back side (large screen gap)
              var dx = pt.x - prev.x, dy = pt.y - prev.y;
              if (dx * dx + dy * dy > (40 * dpr) * (40 * dpr)) {
                c.moveTo(pt.x, pt.y);
              } else {
                c.lineTo(pt.x, pt.y);
              }
            }
            prev = pt;
          }
          c.stroke();
          c.setLineDash([]);
        }

        // ——— Charts / panel (same as before) ———
        var dayChart = document.getElementById("dayChart");
        var dctx = dayChart.getContext("2d");
        var sunChart = document.getElementById("sunChart");
        var sctx = sunChart.getContext("2d");
        var uvChart = document.getElementById("uvChart");
        var uctx = uvChart.getContext("2d");

        function drawDayChart() {
          var w = dayChart.width, h = dayChart.height;
          var pad = { t: 14, r: 12, b: 26, l: 36 };
          var iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
          dctx.clearRect(0, 0, w, h);
          dctx.strokeStyle = "rgba(232,238,242,0.08)";
          dctx.fillStyle = "rgba(155,176,191,0.8)";
          dctx.font = "500 15px sans-serif";
          dctx.textAlign = "right";
          dctx.textBaseline = "middle";
          [0, 12, 24].forEach(function (hr) {
            var y = pad.t + ih * (1 - hr / 24);
            dctx.beginPath(); dctx.moveTo(pad.l, y); dctx.lineTo(pad.l + iw, y); dctx.stroke();
            dctx.fillText(String(hr), pad.l - 6, y);
          });
          dctx.beginPath();
          dctx.strokeStyle = "#d4a85a";
          dctx.lineWidth = 2.5;
          for (var n = 0; n <= 364; n++) {
            var hours = dayLengthHours(selLat, n);
            var x = pad.l + (iw * n) / 364;
            var y = pad.t + ih * (1 - hours / 24);
            if (n === 0) dctx.moveTo(x, y); else dctx.lineTo(x, y);
          }
          dctx.stroke();
          if (hasCompare()) {
            dctx.beginPath();
            dctx.strokeStyle = "#8ec4e0";
            dctx.lineWidth = 2;
            for (n = 0; n <= 364; n++) {
              hours = dayLengthHours(cmpLat, n);
              x = pad.l + (iw * n) / 364;
              y = pad.t + ih * (1 - hours / 24);
              if (n === 0) dctx.moveTo(x, y); else dctx.lineTo(x, y);
            }
            dctx.stroke();
          }
          var xDay = pad.l + (iw * dayOfYear) / 364;
          dctx.strokeStyle = "rgba(240,180,41,0.8)";
          dctx.beginPath(); dctx.moveTo(xDay, pad.t); dctx.lineTo(xDay, pad.t + ih); dctx.stroke();
          var hNow = dayLengthHours(selLat, dayOfYear);
          dctx.beginPath();
          dctx.arc(xDay, pad.t + ih * (1 - hNow / 24), 5, 0, Math.PI * 2);
          dctx.fillStyle = "#f0b429"; dctx.fill();
          if (hasCompare()) {
            var hCmp = dayLengthHours(cmpLat, dayOfYear);
            dctx.beginPath();
            dctx.arc(xDay, pad.t + ih * (1 - hCmp / 24), 4, 0, Math.PI * 2);
            dctx.fillStyle = "#8ec4e0"; dctx.fill();
          }
          dctx.fillStyle = "rgba(155,176,191,0.75)";
          dctx.textAlign = "center"; dctx.textBaseline = "top";
          dctx.font = "500 13px sans-serif";
          dctx.fillText("1月", pad.l, pad.t + ih + 6);
          dctx.fillText("7月", pad.l + iw * 0.5, pad.t + ih + 6);
          dctx.fillText("12月", pad.l + iw, pad.t + ih + 6);
          if (chartHover && chartHover.kind === "day") {
            var hn = Math.round(chartHover.frac * 364);
            var hh = dayLengthHours(selLat, hn);
            var yCmpDay = null;
            if (hasCompare()) {
              yCmpDay = pad.t + ih * (1 - dayLengthHours(cmpLat, hn) / 24);
            }
            drawChartCrosshair(dctx, pad, iw, ih, pad.l + (iw * hn) / 364, pad.t + ih * (1 - hh / 24), yCmpDay);
          }
        }

        function sampleDayCurve(lat, lon) {
          if (lat == null) lat = selLat;
          if (lon == null) lon = selLon;
          var samples = [];
          for (var i = 0; i <= 192; i++) {
            var civil = (i / 192) * 24;
            var solar = civilToSolar(civil, lon);
            var alt = solarAltitude(lat, dayOfYear, solar);
            var uvi = estimateUVI(alt);
            samples.push({ civil: civil, alt: alt, uvi: uvi });
          }
          return samples;
        }
        function hasCompare() {
          return cmpLat != null && cmpLon != null;
        }
        /** Lon used when plotting compare diurnal curves (aligned → current lon). */
        function cmpCurveLon() {
          return lonAlign ? selLon : cmpLon;
        }

        var chartHover = null; // { kind: 'sun'|'uv'|'day', frac: 0..1 }
        function drawChartCrosshair(ctx, pad, iw, ih, x, y, yCmp) {
          x = clamp(x, pad.l, pad.l + iw);
          y = clamp(y, pad.t, pad.t + ih);
          ctx.save();
          ctx.strokeStyle = "rgba(238, 243, 246, 0.45)";
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 3]);
          ctx.beginPath();
          ctx.moveTo(x, pad.t);
          ctx.lineTo(x, pad.t + ih);
          ctx.moveTo(pad.l, y);
          ctx.lineTo(pad.l + iw, y);
          if (yCmp != null) {
            yCmp = clamp(yCmp, pad.t, pad.t + ih);
            ctx.moveTo(pad.l, yCmp);
            ctx.lineTo(pad.l + iw, yCmp);
          }
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.arc(x, y, 3.5, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(240, 180, 41, 0.95)";
          ctx.fill();
          ctx.strokeStyle = "rgba(8, 14, 22, 0.55)";
          ctx.lineWidth = 1;
          ctx.stroke();
          if (yCmp != null) {
            ctx.beginPath();
            ctx.arc(x, yCmp, 3.5, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(142, 196, 224, 0.95)";
            ctx.fill();
            ctx.strokeStyle = "rgba(8, 14, 22, 0.55)";
            ctx.lineWidth = 1;
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawSunChart() {
          var w = sunChart.width, h = sunChart.height;
          var pad = { t: 16, r: 12, b: 26, l: 38 };
          var iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
          var samples = sampleDayCurve();
          var samplesCmp = hasCompare() ? sampleDayCurve(cmpLat, cmpCurveLon()) : null;
          var yMin = -90, yMax = 90;
          function yOf(a) { return pad.t + ih * (1 - (a - yMin) / (yMax - yMin)); }
          function xOf(t) { return pad.l + (iw * t) / 24; }
          sctx.clearRect(0, 0, w, h);
          var y0 = yOf(0);
          if (y0 < pad.t + ih) {
            sctx.fillStyle = "rgba(10,20,32,0.45)";
            sctx.fillRect(pad.l, Math.max(y0, pad.t), iw, pad.t + ih - Math.max(y0, pad.t));
          }
          if (y0 > pad.t) {
            sctx.fillStyle = "rgba(240,180,41,0.08)";
            sctx.fillRect(pad.l, pad.t, iw, Math.min(y0, pad.t + ih) - pad.t);
          }
          sctx.strokeStyle = "rgba(232,238,242,0.08)";
          sctx.fillStyle = "rgba(155,176,191,0.8)";
          sctx.font = "500 13px sans-serif";
          sctx.textAlign = "right"; sctx.textBaseline = "middle";
          var step = 30;
          for (var a = yMin; a <= yMax; a += step) {
            var y = yOf(a);
            sctx.beginPath(); sctx.moveTo(pad.l, y); sctx.lineTo(pad.l + iw, y); sctx.stroke();
            sctx.fillText(a + "°", pad.l - 6, y);
          }
          sctx.strokeStyle = "rgba(232,238,242,0.35)";
          sctx.setLineDash([4, 4]);
          sctx.beginPath(); sctx.moveTo(pad.l, y0); sctx.lineTo(pad.l + iw, y0); sctx.stroke();
          sctx.setLineDash([]);
          sctx.textAlign = "center"; sctx.textBaseline = "top";
          sctx.fillStyle = "rgba(155,176,191,0.75)";
          [0, 6, 12, 18, 24].forEach(function (t) {
            var x = xOf(t);
            sctx.strokeStyle = "rgba(232,238,242,0.06)";
            sctx.beginPath(); sctx.moveTo(x, pad.t); sctx.lineTo(x, pad.t + ih); sctx.stroke();
            sctx.fillText(formatClock(t), x, pad.t + ih + 6);
          });
          var ss = sunriseSunset(selLat, dayOfYear);
          if (ss.kind === "normal") {
            [ss.rise, ss.set].forEach(function (solar) {
              var x = xOf(solarToCivil(solar, selLon));
              sctx.strokeStyle = "rgba(240,180,41,0.35)";
              sctx.setLineDash([3, 3]);
              sctx.beginPath(); sctx.moveTo(x, pad.t); sctx.lineTo(x, pad.t + ih); sctx.stroke();
              sctx.setLineDash([]);
            });
          }
          sctx.beginPath();
          sctx.strokeStyle = "#f0b429";
          sctx.lineWidth = 2.4;
          samples.forEach(function (p, idx) {
            var x = xOf(p.civil), yy = yOf(p.alt);
            if (idx === 0) sctx.moveTo(x, yy); else sctx.lineTo(x, yy);
          });
          sctx.stroke();
          if (samplesCmp) {
            sctx.beginPath();
            sctx.strokeStyle = "#8ec4e0";
            sctx.lineWidth = 2;
            samplesCmp.forEach(function (p, idx) {
              var x = xOf(p.civil), yy = yOf(p.alt);
              if (idx === 0) sctx.moveTo(x, yy); else sctx.lineTo(x, yy);
            });
            sctx.stroke();
          }
          var nowAlt = solarAltitude(selLat, dayOfYear, civilToSolar(civilHour, selLon));
          var xNow = xOf(civilHour), yNow = yOf(nowAlt);
          sctx.strokeStyle = "rgba(212,168,90,0.9)";
          sctx.beginPath(); sctx.moveTo(xNow, pad.t); sctx.lineTo(xNow, pad.t + ih); sctx.stroke();
          sctx.beginPath(); sctx.arc(xNow, yNow, 5, 0, Math.PI * 2);
          sctx.fillStyle = "#f2c14b"; sctx.fill();
          sctx.strokeStyle = "rgba(255,255,255,0.85)"; sctx.lineWidth = 1.5; sctx.stroke();
          if (samplesCmp) {
            var cmpAlt = solarAltitude(cmpLat, dayOfYear, civilToSolar(civilHour, cmpCurveLon()));
            sctx.beginPath(); sctx.arc(xNow, yOf(cmpAlt), 4, 0, Math.PI * 2);
            sctx.fillStyle = "#8ec4e0"; sctx.fill();
          }
          if (chartHover && chartHover.kind === "sun") {
            var ht = chartHover.frac * 24;
            var halt = solarAltitude(selLat, dayOfYear, civilToSolar(ht, selLon));
            var yCmpSun = null;
            if (hasCompare()) {
              yCmpSun = yOf(solarAltitude(cmpLat, dayOfYear, civilToSolar(ht, cmpCurveLon())));
            }
            drawChartCrosshair(sctx, pad, iw, ih, xOf(ht), yOf(halt), yCmpSun);
          }
        }

        function drawUvChart() {
          var w = uvChart.width, h = uvChart.height;
          var pad = { t: 16, r: 12, b: 26, l: 36 };
          var iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
          var samples = sampleDayCurve();
          var samplesCmp = hasCompare() ? sampleDayCurve(cmpLat, cmpCurveLon()) : null;
          var yMax = 14;
          function yOf(u) { return pad.t + ih * (1 - u / yMax); }
          function xOf(t) { return pad.l + (iw * t) / 24; }

          uctx.clearRect(0, 0, w, h);

          // Band UVI < 3
          var y3 = yOf(3);
          uctx.fillStyle = "rgba(90,170,120,0.10)";
          uctx.fillRect(pad.l, y3, iw, pad.t + ih - y3);
          uctx.strokeStyle = "rgba(90,170,120,0.4)";
          uctx.setLineDash([4, 3]);
          uctx.beginPath(); uctx.moveTo(pad.l, y3); uctx.lineTo(pad.l + iw, y3); uctx.stroke();
          uctx.setLineDash([]);
          uctx.fillStyle = "rgba(155,176,191,0.85)";
          uctx.font = "600 11px sans-serif";
          uctx.textAlign = "left";
          uctx.fillText("UVI 3", pad.l + 4, y3 - 5);

          uctx.strokeStyle = "rgba(232,238,242,0.08)";
          uctx.fillStyle = "rgba(155,176,191,0.8)";
          uctx.font = "500 13px sans-serif";
          uctx.textAlign = "right"; uctx.textBaseline = "middle";
          for (var u = 0; u <= yMax; u += 2) {
            var y = yOf(u);
            uctx.beginPath(); uctx.moveTo(pad.l, y); uctx.lineTo(pad.l + iw, y); uctx.stroke();
            uctx.fillText(String(u), pad.l - 6, y);
          }

          uctx.textAlign = "center"; uctx.textBaseline = "top";
          uctx.fillStyle = "rgba(155,176,191,0.75)";
          [0, 6, 12, 18, 24].forEach(function (t) {
            var x = xOf(t);
            uctx.strokeStyle = "rgba(232,238,242,0.06)";
            uctx.beginPath(); uctx.moveTo(x, pad.t); uctx.lineTo(x, pad.t + ih); uctx.stroke();
            uctx.fillText(formatClock(t), x, pad.t + ih + 6);
          });

          // Gradient stroke by level — draw as filled area + line
          uctx.beginPath();
          samples.forEach(function (p, idx) {
            var x = xOf(p.civil), y = yOf(p.uvi);
            if (idx === 0) uctx.moveTo(x, y); else uctx.lineTo(x, y);
          });
          uctx.strokeStyle = "#e08a4a";
          uctx.lineWidth = 2.4;
          uctx.stroke();

          if (samplesCmp) {
            uctx.beginPath();
            samplesCmp.forEach(function (p, idx) {
              var x = xOf(p.civil), y = yOf(p.uvi);
              if (idx === 0) uctx.moveTo(x, y); else uctx.lineTo(x, y);
            });
            uctx.strokeStyle = "#8ec4e0";
            uctx.lineWidth = 2;
            uctx.stroke();
          }

          // Fill under curve with color bands approximated
          uctx.beginPath();
          uctx.moveTo(xOf(0), yOf(0));
          samples.forEach(function (p) { uctx.lineTo(xOf(p.civil), yOf(p.uvi)); });
          uctx.lineTo(xOf(24), yOf(0));
          uctx.closePath();
          var grad = uctx.createLinearGradient(0, yOf(yMax), 0, yOf(0));
          grad.addColorStop(0, "rgba(196,92,92,0.35)");
          grad.addColorStop(0.4, "rgba(212,120,70,0.22)");
          grad.addColorStop(0.7, "rgba(212,168,90,0.16)");
          grad.addColorStop(1, "rgba(90,170,120,0.1)");
          uctx.fillStyle = grad;
          uctx.fill();

          var nowU = estimateUVI(solarAltitude(selLat, dayOfYear, civilToSolar(civilHour, selLon)));
          var xNow = xOf(civilHour), yNow = yOf(nowU);
          uctx.strokeStyle = "rgba(238,243,246,0.55)";
          uctx.lineWidth = 1.2;
          uctx.beginPath(); uctx.moveTo(xNow, pad.t); uctx.lineTo(xNow, pad.t + ih); uctx.stroke();
          uctx.beginPath(); uctx.arc(xNow, yNow, 5, 0, Math.PI * 2);
          uctx.fillStyle = uviLevel(nowU).color;
          uctx.fill();
          uctx.strokeStyle = "#fff"; uctx.lineWidth = 1.5; uctx.stroke();
          uctx.fillStyle = "#eef3f6";
          uctx.font = "700 12px sans-serif";
          uctx.textAlign = civilHour > 18 ? "right" : "left";
          uctx.textBaseline = "bottom";
          uctx.fillText("UVI " + nowU.toFixed(1), civilHour > 18 ? xNow - 7 : xNow + 7, yNow - 5);
          if (samplesCmp) {
            var cmpU = estimateUVI(solarAltitude(cmpLat, dayOfYear, civilToSolar(civilHour, cmpCurveLon())));
            uctx.beginPath(); uctx.arc(xNow, yOf(cmpU), 4, 0, Math.PI * 2);
            uctx.fillStyle = "#8ec4e0"; uctx.fill();
          }
          if (chartHover && chartHover.kind === "uv") {
            var ht = chartHover.frac * 24;
            var hu = estimateUVI(solarAltitude(selLat, dayOfYear, civilToSolar(ht, selLon)));
            var yCmpUv = null;
            if (hasCompare()) {
              yCmpUv = yOf(estimateUVI(solarAltitude(cmpLat, dayOfYear, civilToSolar(ht, cmpCurveLon()))));
            }
            drawChartCrosshair(uctx, pad, iw, ih, xOf(ht), yOf(hu), yCmpUv);
          }
        }

        function updatePanel() {
          document.getElementById("dayLabel").textContent = formatDay(dayOfYear);
          document.getElementById("hourLabel").textContent = formatClock(civilHour);
          document.getElementById("placeName").textContent = formatPlace(selLat, selLon);
          var latEl = document.getElementById("lat");
          var latClamped = clamp(selLat, -89, 89);
          if (latEl && document.activeElement !== latEl) latEl.value = String(latClamped);
          document.getElementById("latLabel").textContent = formatLatShort(selLat);

          var len = dayLengthHours(selLat, dayOfYear);
          var ss = sunriseSunset(selLat, dayOfYear);
          var solarNow = civilToSolar(civilHour, selLon);
          var noon = solarAltitude(selLat, dayOfYear, 12);
          var nowAlt = solarAltitude(selLat, dayOfYear, solarNow);
          var nowU = estimateUVI(nowAlt);
          var lvl = uviLevel(nowU);

          document.getElementById("dayLen").textContent = formatHours(len);
          document.getElementById("noonAlt").textContent = noon.toFixed(1) + "°";
          document.getElementById("nowUvi").textContent = nowU.toFixed(1);
          document.getElementById("nowUvi").style.color = lvl.color;

          if (ss.kind === "normal") {
            document.getElementById("sunrise").textContent = formatClock(solarToCivil(ss.rise, selLon));
            document.getElementById("sunset").textContent = formatClock(solarToCivil(ss.set, selLon));
          } else if (ss.kind === "polar-day") {
            document.getElementById("sunrise").textContent = "极昼";
            document.getElementById("sunset").textContent = "不落";
          } else {
            document.getElementById("sunrise").textContent = "极夜";
            document.getElementById("sunset").textContent = "不出";
          }

          document.getElementById("sunChartLabel").textContent =
            formatClock(civilHour) + " · 高度 " + nowAlt.toFixed(1) + "°";

          var windows = lowUvDaylightWindows(selLat, selLon, dayOfYear, 3);
          var peak = 0;
          var peakCivil = 12;
          var samples = sampleDayCurve();
          for (var i = 0; i < samples.length; i++) {
            if (samples[i].uvi > peak) { peak = samples[i].uvi; peakCivil = samples[i].civil; }
          }
          var lowDayH = lowUvDaylightHours(selLat, selLon, dayOfYear, 3);
          var note = document.getElementById("uvNote");
          var winText = formatWindowList(windows);
          var lowDayLabel;
          if (lowDayH <= 0.01) lowDayLabel = "0h";
          else if (lowDayH >= 23.99) lowDayLabel = "约 24h";
          else {
            var sh = Math.floor(lowDayH);
            var sm = Math.round((lowDayH - sh) * 60);
            lowDayLabel = sh + "h " + String(sm).padStart(2, "0") + "m";
          }
          note.className = "uv-note";
          note.innerHTML =
            "<strong>峰值 UVI " + peak.toFixed(1) + "</strong>" +
            "<span class=\"uv-line\">（" + formatClock(peakCivil) + "）</span><br>" +
            "<span class=\"uv-line\">白天低 UV 约 " + lowDayLabel + "</span><br>" +
            "白天低 UV：" + winText;

          updateCompareUi();
          drawSunChart();
          drawUvChart();
          drawDayChart();
        }

        function updateCompareUi() {
          var clearBtn = document.getElementById("cmpClear");
          var label = document.getElementById("cmpLabel");
          var legend = document.getElementById("cmpLegend");
          var alignWrap = document.getElementById("cmpAlign");
          var alignEl = document.getElementById("lonAlign");
          if (alignEl) alignEl.checked = lonAlign;
          if (hasCompare()) {
            clearBtn.hidden = false;
            legend.hidden = false;
            if (alignWrap) alignWrap.hidden = false;
            label.innerHTML = "对比 <em>" + formatPlace(cmpLat, cmpLon) + "</em>" +
              (lonAlign ? " · 经度已对齐" : "");
          } else {
            clearBtn.hidden = true;
            legend.hidden = true;
            if (alignWrap) alignWrap.hidden = true;
            label.textContent = "";
          }
        }

        function syncAll() {
          dirty = true;
          updatePanel();
          scheduleSave();
        }

        document.getElementById("cmpAdd").addEventListener("click", function () {
          cmpLat = selLat;
          cmpLon = selLon;
          syncAll();
        });
        document.getElementById("cmpClear").addEventListener("click", function () {
          cmpLat = null;
          cmpLon = null;
          syncAll();
        });
        document.getElementById("lonAlign").addEventListener("change", function (e) {
          lonAlign = !!e.target.checked;
          syncAll();
        });

        // Interaction
        var dragging = false, moved = false, lastX = 0, lastY = 0;
        // When geo menu closes on a globe left-click, skip selection on that gesture's pointerup
        var menuJustClosed = false;
        var geoMenu = document.getElementById("geoMenu");
        canvas.addEventListener("pointerdown", function (e) {
          // Right-click opens the geo menu only — never drag or move selLat/selLon
          if (e.button !== 0) return;
          if (geoMenu.classList.contains("on")) {
            hideGeoMenu();
            menuJustClosed = true;
          }
          dragging = true; moved = false;
          lastX = e.clientX; lastY = e.clientY;
          canvas.classList.add("dragging");
          canvas.setPointerCapture(e.pointerId);
        });
        canvas.addEventListener("pointermove", function (e) {
          if (!dragging) return;
          var dx = e.clientX - lastX, dy = e.clientY - lastY;
          if (Math.abs(dx) + Math.abs(dy) > 2) moved = true;
          lastX = e.clientX; lastY = e.clientY;
          yaw += dx * 0.005;
          pitch = clamp(pitch + dy * 0.005, -1.2, 1.2);
          dirty = true;
        });
        canvas.addEventListener("pointerup", function (e) {
          if (e.button !== 0) return;
          dragging = false;
          canvas.classList.remove("dragging");
          try { canvas.releasePointerCapture(e.pointerId); } catch (err) {}
          if (menuJustClosed) {
            menuJustClosed = false;
            if (moved) scheduleSave();
            return;
          }
          if (moved) {
            scheduleSave();
            return;
          }
          var ll = pickLatLon(e.clientX, e.clientY);
          if (!ll) return;
          selLat = Math.round(ll.lat * 10) / 10;
          selLon = Math.round(ll.lon * 10) / 10;
          syncAll();
        });
        canvas.addEventListener("wheel", function (e) {
          e.preventDefault();
          zoom = clamp(zoom * (e.deltaY > 0 ? 0.8836 : 1.1236), 0.7, 8.0);
          scheduleSave();
        }, { passive: false });

        // Right-click: nearby cities within 500 km
        function haversineKm(lat1, lon1, lat2, lon2) {
          var R = 6371;
          var toRad = Math.PI / 180;
          var dLat = (lat2 - lat1) * toRad;
          var dLon = (lon2 - lon1) * toRad;
          var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * toRad) * Math.cos(lat2 * toRad) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
          return 2 * R * Math.asin(Math.min(1, Math.sqrt(a)));
        }
        function hideGeoMenu() {
          geoMenu.classList.remove("on");
          geoMenu.innerHTML = "";
          geoPick = null;
        }
        function showGeoMenu(clientX, clientY, lat, lon) {
          var seen = {};
          var hits = [];
          for (var i = 0; i < CITY_DB.length; i++) {
            var c = CITY_DB[i];
            var key = Math.round(c.lat * 10) + "," + Math.round(c.lon * 10);
            if (seen[key]) continue;
            var d = haversineKm(lat, lon, c.lat, c.lon);
            if (d > 500) continue;
            seen[key] = true;
            hits.push({ name: c.name, lat: c.lat, lon: c.lon, km: d });
          }
          hits.sort(function (a, b) { return a.km - b.km; });
          if (hits.length > 14) hits = hits.slice(0, 14);
          geoPick = { lat: lat, lon: lon, cities: hits, hover: -1 };

          var html = "";
          if (!hits.length) {
            html = '<div class="geo-empty">附近没有收录城市</div>';
          } else {
            html = hits.map(function (h, idx) {
              var dist = h.km < 10 ? h.km.toFixed(1) : String(Math.round(h.km));
              return '<button type="button" role="menuitem" data-i="' + idx +
                '" data-lat="' + h.lat + '" data-lon="' + h.lon +
                '"><span>' + h.name + '</span><span class="d">' + dist + ' km</span></button>';
            }).join("");
          }
          geoMenu.innerHTML = html;
          geoMenu.classList.add("on");
          geoMenu.style.left = "0px";
          geoMenu.style.top = "0px";
          placeGeoMenu(clientX, clientY);
        }
        function placeGeoMenu(clientX, clientY) {
          var pad = 10;
          var gap = 32;
          var mw = geoMenu.offsetWidth || 180;
          var mh = geoMenu.offsetHeight || 120;
          var vw = window.innerWidth;
          var vh = window.innerHeight;
          var bottomEl = document.querySelector(".bottom");
          var sideEl = document.querySelector(".side");
          var bottomTop = bottomEl ? bottomEl.getBoundingClientRect().top : vh;
          var sideLeft = sideEl ? sideEl.getBoundingClientRect().left : vw;

          // Prefer bottom-right of cursor, then other corners if needed
          var candidates = [
            { x: clientX + gap, y: clientY + gap, prefer: 40 },
            { x: clientX - mw - gap, y: clientY + gap, prefer: 18 },
            { x: clientX + gap, y: clientY - mh - gap, prefer: 12 },
            { x: clientX - mw - gap, y: clientY - mh - gap, prefer: 6 },
            { x: clientX + gap, y: clientY - mh * 0.5, prefer: 4 },
            { x: clientX - mw - gap, y: clientY - mh * 0.5, prefer: 2 }
          ];

          function score(c) {
            var x = c.x, y = c.y;
            var s = c.prefer || 0;
            if (x >= pad && y >= pad && x + mw <= vw - pad && y + mh <= vh - pad) s += 50;
            else s -= 120;
            if (y + mh > bottomTop - 8) s -= 90;
            if (x + mw > sideLeft - 8) s -= 35;
            // keep clear of the cursor
            var dx = x + mw * 0.5 - clientX;
            var dy = y + mh * 0.5 - clientY;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < gap + 8) s -= 60;
            else s += Math.min(40, dist * 0.15);
            return s;
          }

          candidates.sort(function (a, b) { return score(b) - score(a); });
          var best = candidates[0];
          var x = clamp(best.x, pad, Math.max(pad, vw - mw - pad));
          var y = clamp(best.y, pad, Math.max(pad, vh - mh - pad));
          if (y + mh > bottomTop - 8) y = Math.max(pad, bottomTop - mh - 10);
          if (x + mw > sideLeft - 8 && sideLeft - mw - pad > pad) {
            x = Math.min(x, sideLeft - mw - 10);
            x = Math.max(pad, x);
          }
          geoMenu.style.left = x + "px";
          geoMenu.style.top = y + "px";
        }
        canvas.addEventListener("contextmenu", function (e) {
          e.preventDefault();
          var ll = pickLatLon(e.clientX, e.clientY);
          if (!ll) {
            hideGeoMenu();
            return;
          }
          showGeoMenu(e.clientX, e.clientY, ll.lat, ll.lon);
        });
        geoMenu.addEventListener("pointerdown", function (e) {
          e.stopPropagation();
        });
        geoMenu.addEventListener("pointerover", function (e) {
          if (!geoPick) return;
          var btn = e.target.closest("button[data-i]");
          var idx = btn ? Number(btn.getAttribute("data-i")) : -1;
          if (geoPick.hover === idx) return;
          geoPick.hover = idx;
        });
        geoMenu.addEventListener("pointerleave", function () {
          if (!geoPick) return;
          geoPick.hover = -1;
        });
        geoMenu.addEventListener("click", function (e) {
          var btn = e.target.closest("button[data-lat]");
          if (!btn) return;
          hideGeoMenu();
          selectCity(btn.getAttribute("data-lat"), btn.getAttribute("data-lon"));
        });
        document.addEventListener("pointerdown", function (e) {
          if (!geoMenu.classList.contains("on")) return;
          if (geoMenu.contains(e.target)) return;
          // Canvas closes the menu itself and sets menuJustClosed for that gesture
          if (e.target === canvas) return;
          hideGeoMenu();
        });
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") hideGeoMenu();
        });

        document.getElementById("day").addEventListener("input", function (e) {
          dayOfYear = Number(e.target.value); syncAll();
        });
        document.getElementById("hour").addEventListener("input", function (e) {
          civilHour = Number(e.target.value); dirty = true; updatePanel(); scheduleSave();
        });
        document.getElementById("lat").addEventListener("input", function (e) {
          selLat = Math.round(clamp(Number(e.target.value), -89, 89) * 10) / 10;
          pitch = clamp(selLat * Math.PI / 180 * 0.6, -1.2, 1.2);
          syncAll();
        });

        /** Drag past either end wraps to the other side (circular scrubbing). */
        function bindWrapRange(el, opts) {
          var period = opts.period;
          var step = opts.step || 1;
          var dragging = false;
          var lastX = 0;
          var accum = 0;
          function commit(raw) {
            var n = ((raw % period) + period) % period;
            if (opts.integer) n = Math.round(n) % period;
            else {
              n = Math.round(n / step) * step;
              n = ((n % period) + period) % period;
              n = Math.round(n * 1000) / 1000;
            }
            if (opts.maxInclusive != null && n > opts.maxInclusive) n = 0;
            if (String(el.value) === String(n)) return;
            el.value = String(n);
            el.dispatchEvent(new Event("input", { bubbles: true }));
          }
          el.addEventListener("pointerdown", function (e) {
            dragging = true;
            lastX = e.clientX;
            accum = Number(el.value);
            // Let native click-to-seek apply, then sync accumulator
            requestAnimationFrame(function () {
              if (dragging) accum = Number(el.value);
            });
            try { el.setPointerCapture(e.pointerId); } catch (err) {}
          });
          el.addEventListener("pointermove", function (e) {
            if (!dragging) return;
            var rect = el.getBoundingClientRect();
            if (rect.width < 1) return;
            var dx = e.clientX - lastX;
            if (Math.abs(dx) < 0.01) return;
            lastX = e.clientX;
            accum += (dx / rect.width) * period;
            commit(accum);
          });
          function endDrag() {
            dragging = false;
          }
          el.addEventListener("pointerup", endDrag);
          el.addEventListener("pointercancel", endDrag);
        }
        bindWrapRange(document.getElementById("day"), { period: 365, step: 1, maxInclusive: 364, integer: true });
        bindWrapRange(document.getElementById("hour"), { period: 24, step: 0.05 });
        document.getElementById("tz").addEventListener("input", function (e) {
          var v = Number(e.target.value);
          if (Number.isNaN(v)) return;
          // Keep the same absolute moment (UTC); only the civil clock changes
          var utcKeep = civilToUtc(civilHour);
          tzOffset = clamp(Math.round(v), -12, 14);
          e.target.value = String(tzOffset);
          civilHour = utcToCivil(utcKeep);
          document.getElementById("hour").value = String(civilHour);
          dirty = true;
          updatePanel();
          scheduleSave();
        });

        // Chart hover readouts
        var chartTip = document.getElementById("chartTip");
        function showChartTip(html, clientX, clientY) {
          chartTip.innerHTML = html;
          chartTip.classList.add("on");
          var tw = chartTip.offsetWidth || 120;
          var th = chartTip.offsetHeight || 40;
          var x = clientX + 12;
          var y = clientY + 14;
          if (x + tw > window.innerWidth - 8) x = clientX - tw - 8;
          if (y + th > window.innerHeight - 8) y = clientY - th - 8;
          chartTip.style.left = x + "px";
          chartTip.style.top = y + "px";
        }
        function hideChartTip() {
          chartTip.classList.remove("on");
        }
        function chartLocalX(canvas, clientX, padL, padR) {
          var rect = canvas.getBoundingClientRect();
          var x = ((clientX - rect.left) / rect.width) * canvas.width;
          var iw = canvas.width - padL - padR;
          return clamp((x - padL) / iw, 0, 1);
        }
        function setChartHover(kind, frac) {
          chartHover = { kind: kind, frac: frac };
          if (kind === "sun") drawSunChart();
          else if (kind === "uv") drawUvChart();
          else drawDayChart();
        }
        function clearChartHover(kind) {
          if (chartHover && chartHover.kind === kind) chartHover = null;
          hideChartTip();
          if (kind === "sun") drawSunChart();
          else if (kind === "uv") drawUvChart();
          else drawDayChart();
        }

        sunChart.addEventListener("mousemove", function (e) {
          var frac = chartLocalX(sunChart, e.clientX, 38, 12);
          var t = frac * 24;
          var alt = solarAltitude(selLat, dayOfYear, civilToSolar(t, selLon));
          setChartHover("sun", frac);
          var tip = formatClock(t) + "<br>" + alt.toFixed(1) + "°";
          if (hasCompare()) {
            var altCmp = solarAltitude(cmpLat, dayOfYear, civilToSolar(t, cmpCurveLon()));
            tip += "<br>对比 " + altCmp.toFixed(1) + "°";
          }
          showChartTip(tip, e.clientX, e.clientY);
        });
        sunChart.addEventListener("mouseleave", function () { clearChartHover("sun"); });

        uvChart.addEventListener("mousemove", function (e) {
          var frac = chartLocalX(uvChart, e.clientX, 36, 12);
          var t = frac * 24;
          var alt = solarAltitude(selLat, dayOfYear, civilToSolar(t, selLon));
          var uvi = estimateUVI(alt);
          var lvl = uviLevel(uvi);
          setChartHover("uv", frac);
          var tip = formatClock(t) +
            "<br>UVI " + uvi.toFixed(1) + " · " + lvl.name +
            "<br>高度角 " + alt.toFixed(1) + "°";
          if (hasCompare()) {
            var altCmp = solarAltitude(cmpLat, dayOfYear, civilToSolar(t, cmpCurveLon()));
            var uviCmp = estimateUVI(altCmp);
            tip += "<br>对比 UVI " + uviCmp.toFixed(1) + " · " + uviLevel(uviCmp).name;
          }
          showChartTip(tip, e.clientX, e.clientY);
        });
        uvChart.addEventListener("mouseleave", function () { clearChartHover("uv"); });

        dayChart.addEventListener("mousemove", function (e) {
          var frac = chartLocalX(dayChart, e.clientX, 36, 12);
          var n = Math.round(frac * 364);
          var hours = dayLengthHours(selLat, n);
          setChartHover("day", frac);
          var tip = formatDay(n) + "<br>" + formatHours(hours);
          if (hasCompare()) {
            tip += "<br>对比 " + formatHours(dayLengthHours(cmpLat, n));
          }
          showChartTip(tip, e.clientX, e.clientY);
        });
        dayChart.addEventListener("mouseleave", function () { clearChartHover("day"); });
        document.querySelectorAll(".ms[data-day]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            dayOfYear = Number(btn.getAttribute("data-day"));
            document.getElementById("day").value = String(dayOfYear);
            syncAll();
          });
        });

        function civilNowInTz() {
          return new Date(Date.now() + tzOffset * 3600000);
        }
        function setDayFromDate(shifted) {
          var month = shifted.getUTCMonth();
          var day = shifted.getUTCDate();
          var n = 0;
          for (var m = 0; m < month; m++) n += MONTH_DAYS[m];
          dayOfYear = clamp(n + day - 1, 0, 364);
          document.getElementById("day").value = String(dayOfYear);
        }
        function setHourFromDate(shifted) {
          civilHour = wrap24(
            shifted.getUTCHours() +
            shifted.getUTCMinutes() / 60 +
            shifted.getUTCSeconds() / 3600
          );
          document.getElementById("hour").value = String(civilHour);
        }
        document.getElementById("jumpToday").addEventListener("click", function () {
          setDayFromDate(civilNowInTz());
          stopPlay();
          syncAll();
        });
        document.getElementById("jumpNow").addEventListener("click", function () {
          setHourFromDate(civilNowInTz());
          stopPlay();
          dirty = true;
          updatePanel();
          scheduleSave();
        });

        var citiesEl = document.getElementById("cities");
        function normalizeSearch(s) {
          return String(s || "").toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .replace(/['’]/g, "");
        }
        function shortEnglish(en) {
          if (!en) return "";
          var parts = en.split(/\s+/);
          var multi = {
            "New": 2, "Los": 2, "San": 2, "Las": 2, "Cape": 2, "Hong": 2,
            "Kuala": 2, "Mexico": 2, "Buenos": 2, "Rio": 3, "Sao": 2, "São": 2,
            "Saint": 2, "St": 2, "Tel": 2, "Abu": 2, "Ho": 4, "Dar": 3,
            "Addis": 2, "Costa": 2, "Port": 2, "Washington": 2,
            "Chiang": 2, "Phnom": 2, "George": 2, "Kota": 2, "Bandar": 3,
            "Koh": 2, "Nha": 2, "Da": 2, "Hai": 2, "Can": 2, "Mui": 2,
            "Phu": 2, "Hua": 2, "Johor": 2, "Puerto": 2, "El": 2,
            "Luang": 2, "Siem": 2, "Labuan": 2
          };
          var n = multi[parts[0]] || 1;
          return parts.slice(0, Math.min(n, parts.length)).join(" ");
        }
        function cityMatches(c, q) {
          if (!q) return true;
          var hay = normalizeSearch(c.name + " " + (c.en || ""));
          var tokens = normalizeSearch(q).split(/\s+/).filter(Boolean);
          for (var i = 0; i < tokens.length; i++) {
            if (hay.indexOf(tokens[i]) === -1) return false;
          }
          return true;
        }
        function selectCity(lat, lon) {
          selLat = Number(lat);
          selLon = Number(lon);
          yaw = -(selLon + 180) * Math.PI / 180;
          pitch = clamp(selLat * Math.PI / 180 * 0.6, -1.2, 1.2);
          dirty = true;
          syncAll();
        }
        function renderCityChips(query) {
          var raw = (query || "").trim();
          var q = normalizeSearch(raw);
          var list;
          if (!q) {
            list = FEATURED.slice();
          } else {
            list = [];
            var seen = {};
            for (var i = 0; i < CITY_DB.length; i++) {
              var c = CITY_DB[i];
              if (!cityMatches(c, q)) continue;
              var key = Math.round(c.lat * 10) + "," + Math.round(c.lon * 10);
              if (seen[key]) continue;
              seen[key] = true;
              list.push(c);
              if (list.length >= 24) break;
            }
          }
          var useEn = !!(raw && /^[\x00-\x7f]+$/.test(raw));
          var html = '<button type="button" id="locateMe" class="locate">定位我当前位置</button>';
          if (!list.length) {
            html += '<div class="city-empty">没有匹配的城市</div>';
          } else {
            html += list.map(function (c) {
              var label = useEn ? (shortEnglish(c.en) || c.name) : c.name;
              return '<button type="button" data-lat="' + c.lat + '" data-lon="' + c.lon + '">' + label + "</button>";
            }).join("");
          }
          citiesEl.innerHTML = html;
          document.getElementById("locateMe").addEventListener("click", onLocateClick);
        }
        function onLocateClick() {
          var btn = document.getElementById("locateMe");
          var locateLabel = "定位我当前位置";
          if (!navigator.geolocation) {
            btn.textContent = "不支持";
            setTimeout(function () { btn.textContent = locateLabel; }, 1600);
            return;
          }
          btn.disabled = true;
          btn.textContent = "定位中…";
          navigator.geolocation.getCurrentPosition(
            function (pos) {
              selLat = Math.round(pos.coords.latitude * 10) / 10;
              selLon = Math.round(pos.coords.longitude * 10) / 10;
              yaw = -(selLon + 180) * Math.PI / 180;
              pitch = clamp(selLat * Math.PI / 180 * 0.6, -1.2, 1.2);
              var utcKeep = civilToUtc(civilHour);
              tzOffset = clamp(Math.round(selLon / 15), -12, 14);
              document.getElementById("tz").value = String(tzOffset);
              civilHour = utcToCivil(utcKeep);
              document.getElementById("hour").value = String(civilHour);
              dirty = true;
              syncAll();
              btn.disabled = false;
              btn.textContent = locateLabel;
            },
            function () {
              btn.disabled = false;
              btn.textContent = "失败";
              setTimeout(function () { btn.textContent = locateLabel; }, 1600);
            },
            { enableHighAccuracy: false, timeout: 12000, maximumAge: 60000 }
          );
        }
        renderCityChips("");
        document.getElementById("citySearch").addEventListener("input", function (e) {
          renderCityChips(e.target.value);
        });
        citiesEl.addEventListener("click", function (e) {
          var btn = e.target.closest("button[data-lat]");
          if (!btn) return;
          selectCity(btn.getAttribute("data-lat"), btn.getAttribute("data-lon"));
        });

        function stopPlay() {
          playingDay = false; playingYear = false;
          var pd = document.getElementById("playDay");
          var py = document.getElementById("playYear");
          pd.setAttribute("aria-pressed", "false");
          py.setAttribute("aria-pressed", "false");
          pd.textContent = "播放";
          py.textContent = "播放";
        }
        document.getElementById("playDay").addEventListener("click", function () {
          if (playingDay) { stopPlay(); return; }
          stopPlay(); playingDay = true; lastTs = 0;
          var pd = document.getElementById("playDay");
          pd.setAttribute("aria-pressed", "true"); pd.textContent = "暂停";
        });
        document.getElementById("playYear").addEventListener("click", function () {
          if (playingYear) { stopPlay(); return; }
          stopPlay(); playingYear = true; lastTs = 0;
          var py = document.getElementById("playYear");
          py.setAttribute("aria-pressed", "true"); py.textContent = "暂停";
        });

        function animate(ts) {
          requestAnimationFrame(animate);
          if (playingDay || playingYear) {
            if (!lastTs) lastTs = ts;
            var dt = ts - lastTs;
            if (playingDay && dt > 30) {
              civilHour = (civilHour + 0.06) % 24;
              document.getElementById("hour").value = String(civilHour);
              dirty = true; updatePanel(); scheduleSave(); lastTs = ts;
            }
            if (playingYear && dt > 40) {
              dayOfYear = (dayOfYear + 1) % 365;
              document.getElementById("day").value = String(dayOfYear);
              syncAll(); lastTs = ts;
            }
          }
          drawFrame();
        }

        loadPersistedState();
        document.getElementById("day").value = String(dayOfYear);
        document.getElementById("hour").value = String(civilHour);
        document.getElementById("tz").value = String(tzOffset);
        syncAll();
        hideLoading();
        requestAnimationFrame(animate);
      }
    })();
  </script>
</body>
